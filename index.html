<!DOCTYPE html>
<html>
<head>
  <title>SMC PRO AI ENGINE V3</title>

  <style>
    body {
      background: #0a0f1f;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      width: 420px;
      margin: 20px auto;
      padding: 20px;
      background: #121a2b;
      border-radius: 12px;
    }

    .signal {
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
    }

    .STRONG_BUY { color:#00ff88; }
    .WEAK_BUY { color:#b6ff4d; }
    .NEUTRAL { color:#ffd000; }
    .WEAK_SELL { color:#ff8c42; }
    .STRONG_SELL { color:#ff2e2e; }

    button {
      padding:10px 20px;
      margin:10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .status {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1> SMC PRO AI ENGINE V3</h1>

<button onclick="enableVoice()">ENABLE VOICE</button>

<div class="box">
  <h2>BTCUSDT</h2>
  <div id="btc">Loading...</div>
</div>

<div class="box">
  <h2>XAUUSD</h2>
  <div id="gold">Loading...</div>
</div>

<div class="box">
  <h2>NEWS</h2>
  <div id="news">Loading...</div>
</div>

<script>

const API_KEY = "650be9347bb14529a7609626174ddb0a";
let voiceEnabled = false;
let lastSpeak = "";

// ---------------- VOICE ----------------
function enableVoice(){
  voiceEnabled = true;
  speechSynthesis.speak(new SpeechSynthesisUtterance("Voice enabled"));
}

function speak(text){
  if(!voiceEnabled) return;
  if(text === lastSpeak) return;
  lastSpeak = text;

  let msg = new SpeechSynthesisUtterance(text);
  msg.rate = 1;
  msg.lang = "en-US";
  speechSynthesis.speak(msg);
}

// ---------------- INDICATORS ----------------
function EMA(data,p){
  let k=2/(p+1), ema=data[0];
  for(let i=1;i<data.length;i++) ema=data[i]*k+ema*(1-k);
  return ema;
}

function RSI(data){
  let g=0,l=0;
  for(let i=1;i<data.length;i++){
    let d=data[i]-data[i-1];
    d>=0?g+=d:l+=Math.abs(d);
  }
  let rs=g/(l||1);
  return 100-(100/(1+rs));
}

function MACD(data){
  return EMA(data.slice(-12),12)-EMA(data.slice(-26),26);
}

// ---------------- NEWS ----------------
function analyzeNews(text){
  text=text.toLowerCase();
  let score=0;

  if(text.includes("crash")||text.includes("war")||text.includes("inflation")) score-=2;
  if(text.includes("hack")||text.includes("ban")) score-=1;

  if(text.includes("bull")||text.includes("surge")||text.includes("rise")) score+=2;
  if(text.includes("etf")||text.includes("adoption")) score+=1;

  return score;
}

// ---------------- SIGNAL ENGINE ----------------
function signalEngine(rsi,emaF,emaS,macd,news){

  let score=0;

  if(emaF>emaS) score+=1;
  else score-=1;

  if(macd>0) score+=1;
  else score-=1;

  if(rsi<30) score+=2;
  if(rsi>70) score-=2;

  score+=news;

  if(score>=4) return "STRONG_BUY";
  if(score>=2) return "WEAK_BUY";
  if(score>=0) return "NEUTRAL";
  if(score>=-2) return "WEAK_SELL";
  return "STRONG_SELL";
}

// ---------------- LEVELS ----------------
function calcLevels(price, signal){
  let slPerc = 0.015;
  let tpPerc = 0.03;

  let entry = price;
  let sl, tp;

  if(signal.includes("BUY")){
    sl = entry * (1 - slPerc);
    tp = entry * (1 + tpPerc);
  } else if(signal.includes("SELL")){
    sl = entry * (1 + slPerc);
    tp = entry * (1 - tpPerc);
  } else {
    sl = entry;
    tp = entry;
  }

  return {entry, sl, tp};
}

// ---------------- TREND ----------------
function getTrend(emaF, emaS){
  if(emaF > emaS * 1.001) return "UP TREND";
  if(emaF < emaS * 0.999) return "DOWN TREND";
  return "SIDEWAYS";
}

// ---------------- FETCH DATA ----------------
async function getData(symbol){
  let url=`https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1min&outputsize=50&apikey=${API_KEY}`;
  let res=await fetch(url);
  let json=await res.json();
  return json.values.map(v=>parseFloat(v.close)).reverse();
}

// ---------------- BTC ----------------
async function btc(newsScore){

  let closes=await getData("BTC/USD");

  let price = closes[closes.length - 1];

  let rsi=RSI(closes);
  let emaF=EMA(closes.slice(-10),10);
  let emaS=EMA(closes.slice(-20),20);
  let macd=MACD(closes);

  let signal=signalEngine(rsi,emaF,emaS,macd,newsScore.btc);
  let levels=calcLevels(price,signal);
  let trend=getTrend(emaF,emaS);

  document.getElementById("btc").innerHTML=
  `<div class="status">Price: ${price.toFixed(2)}</div>
   <div class="status">${trend}</div>
   <div class="signal ${signal}">${signal}</div>
   RSI:${rsi.toFixed(1)} MACD:${macd.toFixed(2)}<br>
   Entry: ${levels.entry.toFixed(2)}<br>
   SL: ${levels.sl.toFixed(2)}<br>
   TP: ${levels.tp.toFixed(2)}`;

  speak("BTC " + signal);
}

// ---------------- GOLD ----------------
async function gold(newsScore){

  let closes=await getData("XAU/USD");

  let price = closes[closes.length - 1];

  let rsi=RSI(closes);
  let emaF=EMA(closes.slice(-10),10);
  let emaS=EMA(closes.slice(-20),20);
  let macd=MACD(closes);

  let signal=signalEngine(rsi,emaF,emaS,macd,newsScore.gold);
  let levels=calcLevels(price,signal);
  let trend=getTrend(emaF,emaS);

  document.getElementById("gold").innerHTML=
  `<div class="status">Price: ${price.toFixed(2)}</div>
   <div class="status">${trend}</div>
   <div class="signal ${signal}">${signal}</div>
   RSI:${rsi.toFixed(1)} MACD:${macd.toFixed(2)}<br>
   Entry: ${levels.entry.toFixed(2)}<br>
   SL: ${levels.sl.toFixed(2)}<br>
   TP: ${levels.tp.toFixed(2)}`;

  speak("Gold " + signal);
}

// ---------------- NEWS ----------------
async function news(){

  let res=await fetch("https://newsapi.org/v2/everything?q=bitcoin OR gold OR inflation&apiKey=cc04c6811bd041cba7ec3a9d51baad92");
  let json=await res.json();

  let btcScore=0;
  let goldScore=0;

  json.articles.slice(0,10).forEach(a=>{
    let t=a.title+" "+a.description;

    if(t.toLowerCase().includes("bitcoin")) btcScore+=analyzeNews(t);
    if(t.toLowerCase().includes("gold")) goldScore+=analyzeNews(t);
  });

  document.getElementById("news").innerHTML=
  `BTC Sentiment: ${btcScore}<br>GOLD Sentiment: ${goldScore}`;

  return {btc:btcScore,gold:goldScore};
}

// ---------------- RUN ----------------
async function run(){
  let newsScore=await news();
  await btc(newsScore);
  await gold(newsScore);
}

run();
setInterval(run,30000);

</script>

</body>
</html>
