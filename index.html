<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC + GOLD SIGNAL PRO</title>
<style>
body{background:#07111f;color:white;font-family:Arial,sans-serif;padding:15px}
h1{text-align:center}
.card{background:#0f172a;border-radius:18px;padding:18px;margin-bottom:20px;box-shadow:0 0 15px rgba(0,0,0,.3)}
.price{font-size:42px;font-weight:bold;margin:10px 0}
.signal{padding:14px;border-radius:12px;text-align:center;font-size:28px;font-weight:bold;margin:15px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.box{background:#1e293b;padding:12px;border-radius:12px}
.small{font-size:13px;color:#94a3b8}
.big{font-size:22px;font-weight:bold}
</style>
</head>
<body>

<h1>BTC + GOLD SIGNAL PRO</h1>
<p>Replace API_KEY with your TwelveData key.</p>

<div class="card">
<h2>BTC/USD</h2>
<div id="btcPrice" class="price">Loading...</div>
<div id="btcSignal" class="signal">WAIT</div>
<div class="grid">
<div class="box"><div class="small">EMA20</div><div id="btcE20" class="big">--</div></div>
<div class="box"><div class="small">EMA50</div><div id="btcE50" class="big">--</div></div>
<div class="box"><div class="small">RSI</div><div id="btcRsi" class="big">--</div></div>
<div class="box"><div class="small">Trend</div><div id="btcTrend" class="big">--</div></div>
</div>
</div>

<div class="card">
<h2>XAU/USD (Gold)</h2>
<div id="goldPrice" class="price">Loading...</div>
<div id="goldSignal" class="signal">WAIT</div>
<div class="grid">
<div class="box"><div class="small">EMA20</div><div id="goldE20" class="big">--</div></div>
<div class="box"><div class="small">EMA50</div><div id="goldE50" class="big">--</div></div>
<div class="box"><div class="small">RSI</div><div id="goldRsi" class="big">--</div></div>
<div class="box"><div class="small">Trend</div><div id="goldTrend" class="big">--</div></div>
</div>
</div>

<script>
const API_KEY="650be9347bb14529a7609626174ddb0a";

function ema(data,p){let k=2/(p+1),v=data[0];for(let i=1;i<data.length;i++)v=data[i]*k+v*(1-k);return v;}
function rsi(prices,period=14){
 let gains=0,losses=0;
 for(let i=prices.length-period;i<prices.length;i++){
  let d=prices[i]-prices[i-1];
  if(d>0) gains+=d; else losses+=Math.abs(d);
 }
 if(losses===0) return 100;
 let rs=gains/losses;
 return 100-(100/(1+rs));
}

function applySignal(el,trendEl,price,e20,e50,r){
 let signal="WAIT", trend="SIDEWAYS";
 if(price>e20 && e20>e50 && r>55 && r<75){signal="BUY";trend="BULLISH";}
 else if(price>e20 && e20>e50 && r>=75){signal="STRONG BUY";trend="BULLISH";}
 else if(price<e20 && e20<e50 && r<45 && r>25){signal="SELL";trend="BEARISH";}
 else if(price<e20 && e20<e50 && r<=25){signal="STRONG SELL";trend="BEARISH";}

 el.innerText=signal;
 trendEl.innerText=trend;

 if(signal.includes("BUY")){el.style.background="green";}
 else if(signal.includes("SELL")){el.style.background="crimson";}
 else{el.style.background="orange";}
}

async function loadSymbol(symbol,ids){
 try{
  const url=`https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1min&outputsize=100&apikey=${API_KEY}`;
  const res=await fetch(url);
  const data=await res.json();

  if(!data.values) throw new Error("API Error");

  const closes=data.values.reverse().map(v=>parseFloat(v.close));
  const price=closes[closes.length-1];
  const e20=ema(closes,20);
  const e50=ema(closes,50);
  const r=rsi(closes);

  document.getElementById(ids.price).innerText="$"+price.toFixed(2);
  document.getElementById(ids.e20).innerText=e20.toFixed(2);
  document.getElementById(ids.e50).innerText=e50.toFixed(2);
  document.getElementById(ids.rsi).innerText=r.toFixed(1);

  applySignal(
   document.getElementById(ids.signal),
   document.getElementById(ids.trend),
   price,e20,e50,r
  );
 }catch(e){
  document.getElementById(ids.price).innerText="API ERROR";
 }
}

function refresh(){
 loadSymbol("BTC/USD",{price:"btcPrice",signal:"btcSignal",e20:"btcE20",e50:"btcE50",rsi:"btcRsi",trend:"btcTrend"});
 loadSymbol("XAU/USD",{price:"goldPrice",signal:"goldSignal",e20:"goldE20",e50:"goldE50",rsi:"goldRsi",trend:"goldTrend"});
}

refresh();
setInterval(refresh,10000);
</script>
</body>
</html>
