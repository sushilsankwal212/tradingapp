<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC & Gold Signal Pro</title>
<style>
body{background:#0b1220;color:white;font-family:Arial;padding:15px}
.card{background:#111827;border-radius:16px;padding:15px;margin-bottom:15px}
.price{font-size:36px;font-weight:bold;color:#38bdf8}
.signal{padding:12px;border-radius:10px;text-align:center;font-size:24px;font-weight:bold;margin-top:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.box{background:#1f2937;padding:10px;border-radius:10px}
.small{font-size:12px;color:#9ca3af}
.big{font-size:18px;font-weight:bold}
</style>
</head>
<body>
<h1>BTC + GOLD SIGNAL PRO</h1>

<div class="card">
<h2>BTC/USD</h2>
<div id="btcPrice" class="price">Loading...</div>
<div id="btcSignal" class="signal">WAIT</div>
<div class="grid">
<div class="box"><div class="small">EMA20</div><div id="btcE20" class="big">--</div></div>
<div class="box"><div class="small">EMA50</div><div id="btcE50" class="big">--</div></div>
<div class="box"><div class="small">RSI</div><div id="btcRsi" class="big">--</div></div>
<div class="box"><div class="small">Trend</div><div id="btcTrend" class="big">--</div></div>
</div>
</div>

<div class="card">
<h2>XAU/USD (Gold)</h2>
<div id="goldPrice" class="price">Loading...</div>
<div id="goldSignal" class="signal">WAIT</div>
<div class="grid">
<div class="box"><div class="small">EMA20</div><div id="goldE20" class="big">--</div></div>
<div class="box"><div class="small">EMA50</div><div id="goldE50" class="big">--</div></div>
<div class="box"><div class="small">RSI</div><div id="goldRsi" class="big">--</div></div>
<div class="box"><div class="small">Trend</div><div id="goldTrend" class="big">--</div></div>
</div>
</div>

<script>
function ema(arr,p){
 let k=2/(p+1),e=arr[0];
 for(let i=1;i<arr.length;i++) e=arr[i]*k+e*(1-k);
 return e;
}

function rsi(prices,period=14){
 let gains=0,losses=0;
 for(let i=prices.length-period;i<prices.length;i++) {
   let d=prices[i]-prices[i-1];
   if(d>0) gains+=d; else losses+=Math.abs(d);
 }
 if(losses===0) return 100;
 let rs=(gains/period)/(losses/period);
 return 100-(100/(1+rs));
}

function applySignal(signalEl, trendEl, e20,e50,r){
 let signal="WAIT",trend="SIDEWAYS";

 if(e20>e50){
   trend="BULLISH";
   if(r>=60) signal="STRONG BUY";
   else if(r>=45) signal="BUY";
   else signal="WEAK BUY";
 }
 else {
   trend="BEARISH";
   if(r<=40) signal="STRONG SELL";
   else if(r<=55) signal="SELL";
   else signal="WEAK SELL";
 }

 signalEl.innerText=signal;
 trendEl.innerText=trend;

 if(signal.includes("BUY")){
   signalEl.style.background="#22c55e";
   signalEl.style.color="#000";
 } else {
   signalEl.style.background="#ef4444";
   signalEl.style.color="#fff";
 }
}

async function loadSymbol(symbol, ids){
 try{
 const url=`https://api.twelvedata.com/time_series?symbol=${symbol}&interval=15min&outputsize=100&apikey=650be9347bb14529a7609626174ddb0a`;
 const res=await fetch(url);
 const data=await res.json();

 if(!data.values) throw new Error("No data");

 const closes=data.values.reverse().map(x=>parseFloat(x.close));
 const price=closes[closes.length-1];
 const e20=ema(closes.slice(-20),20);
 const e50=ema(closes.slice(-50),50);
 const r=rsi(closes);

 document.getElementById(ids.price).innerText="$"+price.toFixed(2);
 document.getElementById(ids.e20).innerText=e20.toFixed(2);
 document.getElementById(ids.e50).innerText=e50.toFixed(2);
 document.getElementById(ids.rsi).innerText=r.toFixed(1);

 applySignal(
   document.getElementById(ids.signal),
   document.getElementById(ids.trend),
   e20,e50,r
 );
 }catch(e){
   document.getElementById(ids.price).innerText="API Error";
 }
}

function refresh(){
 loadSymbol("BTC/USD",{price:"btcPrice",signal:"btcSignal",e20:"btcE20",e50:"btcE50",rsi:"btcRsi",trend:"btcTrend"});
 loadSymbol("XAU/USD",{price:"goldPrice",signal:"goldSignal",e20:"goldE20",e50:"goldE50",rsi:"goldRsi",trend:"goldTrend"});
}

refresh();
setInterval(refresh,30000);
</script>
</body>
</html>
