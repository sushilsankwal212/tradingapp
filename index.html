<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLD Signal Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#030712;
color:white;
padding:15px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#FFD700;
}

.live{
color:#22C55E;
font-size:14px;
}

.card{
background:#111827;
border-radius:25px;
padding:20px;
margin-bottom:15px;
}

.price{
font-size:52px;
font-weight:bold;
}

.time{
margin-top:10px;
color:#9CA3AF;
}

.signal{
text-align:center;
padding:25px;
border-radius:20px;
font-size:42px;
font-weight:bold;
margin-bottom:15px;
}

.buy{
background:#22C55E;
color:black;
}

.sell{
background:#EF4444;
}

.wait{
background:#F59E0B;
color:black;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.small{
background:#111827;
padding:18px;
border-radius:18px;
}

.label{
font-size:13px;
color:#9CA3AF;
margin-bottom:8px;
}

.value{
font-size:24px;
font-weight:bold;
}

.trade{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:15px;
}

.entry{
border:1px solid #374151;
}

.sl{
border:1px solid #EF4444;
}

.tp{
border:1px solid #22C55E;
}

button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
background:#2563EB;
color:white;
}

.footer{
text-align:center;
margin-top:15px;
color:#6B7280;
}
</style>
</head>
<body>

<div class="header">
<div>
<div class="logo">🟡 GOLD Signal Pro</div>
<div class="live">🟢 Live</div>
</div>
</div>

<div class="card">
<div class="price" id="price">$--</div>
<div class="time" id="time">Loading...</div>
</div>

<div id="signalBox" class="signal wait">
WAIT
</div>

<div class="grid">

<div class="small">
<div class="label">EMA20</div>
<div class="value" id="ema20">--</div>
</div>

<div class="small">
<div class="label">EMA50</div>
<div class="value" id="ema50">--</div>
</div>

<div class="small">
<div class="label">ENTRY</div>
<div class="value" id="entry">--</div>
</div>

<div class="small">
<div class="label">CONFIDENCE</div>
<div class="value" id="confidence">50%</div>
</div>

</div>

<div class="trade">

<div class="small entry">
<div class="label">ENTRY</div>
<div class="value" id="entry2">--</div>
</div>

<div class="small sl">
<div class="label">STOP LOSS</div>
<div class="value" id="sl">--</div>
</div>

<div class="small tp">
<div class="label">TAKE PROFIT</div>
<div class="value" id="tp">--</div>
</div>

</div>

<button onclick="testVoice()">
🔊 Test Voice
</button>

<div class="footer">
Auto Refresh Every 5 Seconds
</div>

<script>

let lastSignal="";

function speak(text){
speechSynthesis.cancel();
const msg=new SpeechSynthesisUtterance(text);
msg.lang="en-US";
speechSynthesis.speak(msg);
}

function testVoice(){
speak("Gold signal assistant ready.");
}

function calculateEMA(prices,period){

const multiplier=2/(period+1);
let ema=prices[0];

for(let i=1;i<prices.length;i++){
ema=((prices[i]-ema)*multiplier)+ema;
}

return ema;

}

async function loadData(){

try{

const response=await fetch(
"https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=15min&outputsize=100&apikey=650be9347bb14529a7609626174ddb0a"
);

const result=await response.json();

if(!result.values){
throw new Error("No Data");
}

const closes=result.values
.reverse()
.map(x=>parseFloat(x.close));

const price=closes[closes.length-1];

const ema20=calculateEMA(closes.slice(-20),20);
const ema50=calculateEMA(closes.slice(-50),50);

document.getElementById("price").innerHTML=
"$"+price.toFixed(2);

document.getElementById("time").innerHTML=
"Updated : "+new Date().toLocaleTimeString();

document.getElementById("ema20").innerHTML=
ema20.toFixed(2);

document.getElementById("ema50").innerHTML=
ema50.toFixed(2);

document.getElementById("entry").innerHTML=
price.toFixed(2);

document.getElementById("entry2").innerHTML=
price.toFixed(2);

let signal="WAIT";
let confidence="50%";

const box=document.getElementById("signalBox");

if(ema20>ema50){

signal="BUY";
confidence="78%";

box.className="signal buy";
box.innerHTML="🟢 BUY";

}
else if(ema20<ema50){

signal="SELL";
confidence="78%";

box.className="signal sell";
box.innerHTML="🔴 SELL";

}
else{

signal="WAIT";

box.className="signal wait";
box.innerHTML="🟡 WAIT";

}

document.getElementById("confidence").innerHTML=
confidence;

if(signal!==lastSignal){

if(signal==="BUY"){
speak("Buy Gold now");
navigator.vibrate(300);
}

if(signal==="SELL"){
speak("Sell Gold now");
navigator.vibrate(300);
}

if(signal==="WAIT"){
speak("Wait for confirmation");
}

lastSignal=signal;

}

let sl,tp;

if(signal==="BUY"){

sl=price*0.995;
tp=price*1.01;

}
else if(signal==="SELL"){

sl=price*1.005;
tp=price*0.99;

}
else{

sl=0;
tp=0;

}

document.getElementById("sl").innerHTML=
"$"+sl.toFixed(2);

document.getElementById("tp").innerHTML=
"$"+tp.toFixed(2);

}
catch(err){

document.getElementById("price").innerHTML=
"Data Error";

console.log(err);

}

}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
