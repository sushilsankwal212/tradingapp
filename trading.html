<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Signal Pro Advanced</title>
<style>
body{background:#030712;color:#fff;font-family:Arial,sans-serif;padding:15px}
.card,.small{background:#111827;border-radius:20px;padding:18px}
.price{font-size:48px;font-weight:bold}
.signal{text-align:center;padding:25px;border-radius:20px;font-size:40px;font-weight:bold;margin:15px 0}
.buy{background:#22C55E;color:#000}
.sell{background:#EF4444}
.wait{background:#F59E0B;color:#000}
.grid,.trade{display:grid;gap:10px}
.grid{grid-template-columns:1fr 1fr}
.trade{grid-template-columns:1fr 1fr 1fr;margin-top:10px}
.label{color:#9CA3AF;font-size:13px}
.value{font-size:24px;font-weight:bold}
button{width:100%;padding:15px;border:none;border-radius:15px;background:#2563EB;color:#fff;font-size:18px;margin-top:15px}
</style>
</head>
<body>

<h1>🔥🔥 BTC Signal Pro Advanced</h1>

<div class="card">
<div class="price" id="price">$--</div>
<div id="time">Loading...</div>
</div>

<div id="signalBox" class="signal wait">WAIT</div>

<div class="grid">
<div class="small"><div class="label">EMA20</div><div class="value" id="ema20">--</div></div>
<div class="small"><div class="label">EMA50</div><div class="value" id="ema50">--</div></div>
<div class="small"><div class="label">RSI</div><div class="value" id="rsi">--</div></div>
<div class="small"><div class="label">CONFIDENCE</div><div class="value" id="confidence">--</div></div>
</div>

<div class="trade">
<div class="small"><div class="label">ENTRY</div><div class="value" id="entry">--</div></div>
<div class="small"><div class="label">STOP LOSS</div><div class="value" id="sl">--</div></div>
<div class="small"><div class="label">TAKE PROFIT</div><div class="value" id="tp">--</div></div>
</div>

<button onclick="speechSynthesis.speak(new SpeechSynthesisUtterance('Voice working'))">Test Voice</button>

<script>
function calculateEMA(prices,p){
 let m=2/(p+1), ema=prices[0];
 for(let i=1;i<prices.length;i++) ema=((prices[i]-ema)*m)+ema;
 return ema;
}

function calculateRSI(prices,period=14){
 let gains=0,losses=0;
 for(let i=prices.length-period;i<prices.length;i++){
   let d=prices[i]-prices[i-1];
   if(d>0) gains+=d; else losses+=Math.abs(d);
 }
 let rs=gains/(losses||1);
 return 100-(100/(1+rs));
}

async function loadData(){
 try{
   const r=await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=15m&limit=100");
   const data=await r.json();

   const closes=data.map(x=>parseFloat(x[4]));
   const price=closes[closes.length-1];

   const ema20=calculateEMA(closes.slice(-20),20);
   const ema50=calculateEMA(closes.slice(-50),50);
   const rsi=calculateRSI(closes);

   let signal="WAIT", confidence="65%";
   const box=document.getElementById("signalBox");

   if(price>ema20 && ema20>ema50 && rsi>55){
      signal="BUY"; confidence="90%";
      box.className="signal buy"; box.innerHTML="ðŸš€ BUY";
   }else if(price<ema20 && ema20<ema50 && rsi<45){
      signal="SELL"; confidence="90%";
      box.className="signal sell"; box.innerHTML="ðŸ”» SELL";
   }else{
      box.className="signal wait"; box.innerHTML="â³ WAIT";
   }

   let sl=0,tp=0;
   if(signal==="BUY"){ sl=price*0.995; tp=price*1.015; }
   if(signal==="SELL"){ sl=price*1.005; tp=price*0.985; }

   document.getElementById("price").innerText="$"+price.toLocaleString();
   document.getElementById("time").innerText="Updated: "+new Date().toLocaleTimeString();
   document.getElementById("ema20").innerText=ema20.toFixed(2);
   document.getElementById("ema50").innerText=ema50.toFixed(2);
   document.getElementById("rsi").innerText=rsi.toFixed(1);
   document.getElementById("confidence").innerText=confidence;
   document.getElementById("entry").innerText=price.toFixed(2);
   document.getElementById("sl").innerText="$"+sl.toFixed(2);
   document.getElementById("tp").innerText="$"+tp.toFixed(2);

 }catch(e){
   document.getElementById("price").innerText="API Error";
 }
}

loadData();
setInterval(loadData,5000);
</script>
</body>
</html>
